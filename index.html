<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AstroGlow</title>
    <style>
        .nav-buttons {
            display: flex;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        body {
            background-image: url('https://apod.nasa.gov/apod/image/1910/M42Detailed_DrudisGoldman_8150.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #fff; /* global text color */
        }
        #scene {
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #000000;
            min-height: 100px;
            font-size: 1.2em;
            color: #fff; /* ensure contents are white */
            text-shadow: 1px 1px 6px #000, 0 0 2px #000;
        }
        /* make any text inside the scene white as well */
        #scene, #scene * {
            color: #fff !important;
        }
        #scene table, #scene table th, #scene table td {
            color: #fff !important;
        }
        button {
            margin-right: 10px;
            margin-bottom: 10px;
        }
    </style>
    <!-- load astronomy library globally so subpages can use it -->
    <script src="Astro-sub/astronomy.min.js"></script>
</head>
<body>
    <button onclick="changeScene('menu-content.html')">Menu</button>
    <button onclick="changeScene('about.html')">About</button>
    <button onclick="changeScene('contact.html')">Contact</button>
    <button onclick="changeScene('help.html')">Help</button>
    <button onclick="changeScene('MoonPhase.html')">Moon Phase</button>
    <button onclick="changeScene('parallax.html')">Stellar Parallax</button>
    <button onclick="changeScene('redshift.html')">Redshift</button>
    <button onclick="changeScene('escape.html')">Escape Velocity</button>
    <button onclick="changeScene('gforce.html')">Gravitational Force</button>
    <button onclick="changeScene('angular.html')">Angular Size</button>
    <button onclick="changeScene('emc.html')">E=mc^2</button>
    <button onclick="changeScene('universalgravity.html')">Universal Gravity</button>
    <button
onclick="changeScene('fitsjs.html')">star magnitude</button>
    <!-- link for debugging; you can click it to see if the file is actually reachable -->
    <button onclick="changeScene('Astro-sub/planet_positions.html')">Planet Positions</button>
    <a id="planet-link" href="Astro-sub/planet_positions.html" style="display:none">raw planet page</a>

    <div id="scene">
        Welcome! This app is designed to make astronomy tools easier to use.
        <p>Here we also have links to helpful websites and resources.</p>
    </div>

    <script>
        function changeScene(filename) {
            // log what path we're trying to load and resolve it relative to the
            // current location so we can see exactly what URL the browser requests.
            const url = new URL(filename, window.location.href).href;
            console.log('changeScene called:', filename, '->', url);
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('File not found');
                    return response.text();
                })
                .then(html => {
                    const sceneDiv = document.getElementById('scene');
                    sceneDiv.innerHTML = html;
                    // Find and execute scripts in the loaded HTML
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = html;
                    const scripts = tempDiv.querySelectorAll('script');
                    // Load external scripts first, then execute inline scripts
                    const inlineCodes = [];
                    const loadPromises = [];
                    scripts.forEach(oldScript => {
                        if (oldScript.src) {
                            const newScript = document.createElement('script');
                            newScript.src = oldScript.src;
                            // track loading so inline scripts run afterwards
                            loadPromises.push(new Promise((res, rej) => {
                                newScript.onload = res;
                                newScript.onerror = rej;
                            }));
                            document.body.appendChild(newScript);
                        } else {
                            inlineCodes.push(oldScript.textContent);
                        }
                    });
                    Promise.all(loadPromises).then(() => {
                        inlineCodes.forEach(code => {
                            const s = document.createElement('script');
                            s.textContent = code;
                            document.body.appendChild(s);
                        });
                        // call any initializer defined by the loaded scene
                        if (typeof sceneInit === 'function') {
                            try { sceneInit(); }
                            catch(err) { console.error('sceneInit error', err); }
                        }
                    }).catch(err => {
                        console.error('Failed to load external script', err);
                    });
                })
                .catch(() => {
                    document.getElementById('scene').textContent = "Scene not found.";
                });
        }
    </script>
</body>
</html>
