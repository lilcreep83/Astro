<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroGlow · Live Planetary Tracker</title>
    <style>
        /* ── reset & base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #080a12;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }

        /* ── animated starfield ── */
        .stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.15; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .orb-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        .orb-glow-1 {
            width: 500px;
            height: 500px;
            background: #6c5ce7;
            top: -200px;
            right: -150px;
            animation: drift 20s ease-in-out infinite alternate;
        }
        .orb-glow-2 {
            width: 400px;
            height: 400px;
            background: #00b4d8;
            bottom: -150px;
            left: -100px;
            animation: drift 25s ease-in-out infinite alternate-reverse;
        }
        @keyframes drift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 40px); }
        }

        /* ── back button ── */
        .back-bar {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 10;
            background: rgba(12, 16, 28, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            padding: 8px 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .back-bar:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .back-bar:active {
            transform: scale(0.96);
        }

        /* ── main card ── */
        .astro-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 820px;
            margin: 60px auto 0;
            background: rgba(12, 16, 28, 0.72);
            backdrop-filter: blur(18px) saturate(1.4);
            -webkit-backdrop-filter: blur(18px) saturate(1.4);
            border-radius: 40px;
            padding: 40px 44px 48px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
            transition: box-shadow 0.4s;
            color: #fff;
        }
        .astro-card:hover {
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
        }

        .astro-card .header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px 24px;
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 20px;
        }
        .astro-card .title-group {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .astro-card .logo-icon {
            font-size: 32px;
            line-height: 1;
            filter: drop-shadow(0 0 12px rgba(108, 92, 231, 0.5));
        }
        .astro-card .title-group h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #e8edff 0%, #a5b4fc 50%, #6c5ce7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .astro-card .title-group .sub {
            font-size: 14px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.3);
            -webkit-text-fill-color: rgba(255, 255, 255, 0.3);
            margin-left: 4px;
        }
        .astro-card .timestamp {
            font-size: 14px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.04em;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 18px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }
        .astro-card .timestamp span {
            color: rgba(255, 255, 255, 0.6);
        }

        .astro-card .table-wrap {
            overflow-x: auto;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .astro-card table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }
        .astro-card thead th {
            text-align: left;
            padding: 18px 20px 14px;
            font-weight: 500;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.25);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(0, 0, 0, 0.15);
        }
        .astro-card thead th:first-child {
            padding-left: 24px;
        }
        .astro-card thead th:last-child {
            padding-right: 24px;
        }
        .astro-card tbody tr {
            transition: background 0.25s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            cursor: default;
        }
        .astro-card tbody tr:last-child {
            border-bottom: none;
        }
        .astro-card tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        .astro-card tbody td {
            padding: 16px 20px;
            color: rgba(255, 255, 255, 0.8);
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.01em;
        }
        .astro-card tbody td:first-child {
            padding-left: 24px;
        }
        .astro-card tbody td:last-child {
            padding-right: 24px;
        }

        .astro-card .planet-name {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            color: #fff;
            cursor: pointer;
            border-radius: 40px;
            padding: 4px 12px 4px 4px;
            transition: background 0.2s, transform 0.15s;
            margin-left: -8px;
            width: fit-content;
            position: relative;
        }
        .astro-card .planet-name:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(4px);
        }
        .astro-card .planet-name:active {
            transform: scale(0.96);
        }
        .astro-card .planet-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 12px var(--dot-glow, rgba(255, 255, 255, 0.1));
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .astro-card .planet-name:hover .planet-dot {
            transform: scale(1.35);
            box-shadow: 0 0 28px var(--dot-glow, rgba(255, 255, 255, 0.3));
        }
        .astro-card .click-hint {
            display: inline-block;
            font-size: 10px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 0.04em;
            margin-left: 4px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .astro-card .planet-name:hover .click-hint {
            opacity: 1;
        }
        .astro-card .ra-value, .astro-card .dec-value {
            font-weight: 400;
            color: rgba(255, 255, 255, 0.75);
        }
        .astro-card .dec-value .sign {
            opacity: 0.5;
            font-weight: 300;
        }

        .astro-card .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }
        .astro-card .pulse-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #6c5ce7;
            animation: pulse-dot 1.8s ease-in-out infinite;
            box-shadow: 0 0 14px rgba(108, 92, 231, 0.4);
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 0.3; transform: scale(0.85); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* ── modal ── */
        .astro-modal {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px) saturate(1.2);
            -webkit-backdrop-filter: blur(20px) saturate(1.2);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            padding: 24px;
        }
        .astro-modal.active {
            opacity: 1;
            pointer-events: auto;
        }
        .astro-modal .modal-content {
            background: rgba(12, 16, 28, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            max-width: 640px;
            width: 100%;
            padding: 32px 32px 40px;
            box-shadow: 0 50px 120px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
            transform: scale(0.92) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
            opacity: 0;
            position: relative;
            text-align: center;
        }
        .astro-modal.active .modal-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }
        .astro-modal .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 28px;
            line-height: 1;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            padding: 8px 12px;
            border-radius: 40px;
        }
        .astro-modal .modal-close:hover {
            color: #fff;
            transform: rotate(90deg);
            background: rgba(255, 255, 255, 0.04);
        }
        .astro-modal .modal-title {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 18px;
            background: linear-gradient(135deg, #e8edff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            padding: 0 8px;
        }
        .astro-modal .modal-title .sub {
            font-size: 14px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.25);
            -webkit-text-fill-color: rgba(255, 255, 255, 0.25);
            margin-left: 8px;
        }
        .astro-modal .modal-image-wrap {
            border-radius: 24px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            position: relative;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .astro-modal .modal-image-wrap img {
            display: block;
            width: 100%;
            height: auto;
            max-height: 60vh;
            object-fit: contain;
            transition: filter 0.4s;
            filter: brightness(0.95) saturate(1.1);
        }
        .astro-modal .modal-image-wrap img:hover {
            filter: brightness(1.05) saturate(1.2);
        }
        .astro-modal .fallback-placeholder {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 60px 20px;
            gap: 12px;
        }
        .astro-modal .fallback-placeholder .planet-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            box-shadow: 0 0 60px var(--circle-glow, rgba(255,255,255,0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 4px 20px rgba(0,0,0,0.6);
            transition: all 0.3s;
        }
        .astro-modal .fallback-placeholder .sub {
            font-size: 1rem;
            font-weight: 300;
            opacity: 0.4;
            margin-top: 4px;
        }
        .astro-modal .modal-image-wrap img.error {
            display: none;
        }
        .astro-modal .modal-image-wrap img.error + .fallback-placeholder {
            display: flex;
        }
        .astro-modal .modal-footer {
            margin-top: 18px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 0.02em;
            font-style: italic;
        }

        @media (max-width: 640px) {
            .astro-card { padding: 24px 18px 32px; border-radius: 28px; }
            .astro-card .header { flex-direction: column; align-items: flex-start; gap: 12px; padding-bottom: 16px; }
            .astro-card .title-group h1 { font-size: 20px; }
            .astro-card .logo-icon { font-size: 26px; }
            .astro-card .timestamp { font-size: 12px; padding: 4px 14px; }
            .astro-card table { font-size: 13px; }
            .astro-card thead th { padding: 14px 12px 10px; font-size: 10px; }
            .astro-card tbody td { padding: 12px 12px; }
            .astro-card .planet-name { gap: 10px; padding: 2px 8px 2px 2px; }
            .astro-card .planet-dot { width: 8px; height: 8px; }
            .astro-card .click-hint { display: none; }
            .astro-modal .modal-content { padding: 24px 18px 30px; border-radius: 28px; }
            .astro-modal .modal-title { font-size: 22px; }
            .astro-modal .fallback-placeholder .planet-circle { width: 80px; height: 80px; font-size: 2rem; }
        }
        @media (max-width: 440px) {
            .astro-card { padding: 16px 12px 24px; border-radius: 20px; }
            .astro-card .title-group h1 { font-size: 17px; }
            .astro-card .title-group .sub { font-size: 11px; }
            .astro-card .logo-icon { font-size: 20px; }
            .astro-card table { font-size: 12px; }
            .astro-card thead th, .astro-card tbody td { padding: 10px 8px; }
            .astro-modal .modal-content { padding: 18px 12px 24px; }
            .astro-modal .fallback-placeholder .planet-circle { width: 60px; height: 60px; font-size: 1.5rem; }
            .back-bar { top: 12px; left: 12px; padding: 6px 14px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <!-- ═══ starfield ═══ -->
    <div class="stars" id="stars"></div>
    <div class="orb-glow orb-glow-1"></div>
    <div class="orb-glow orb-glow-2"></div>

    <!-- ═══ back to menu button ═══ -->
    <a href="index.html" class="back-bar">← Back to Menu</a>

    <!-- ═══ main card ═══ -->
    <div class="astro-card">
        <div class="header">
            <div class="title-group">
                <span class="logo-icon">✦</span>
                <h1>AstroGlow <span class="sub">· live</span></h1>
            </div>
            <div class="timestamp" id="timestamp">⟡ <span>calculating…</span></div>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Planet <span style="font-weight:300;opacity:0.4;margin-left:8px;">⏎ click</span></th>
                        <th>Right Ascension (RA)</th>
                        <th>Declination (Dec)</th>
                    </tr>
                </thead>
                <tbody id="planet-rows">
                    <!-- injected -->
                </tbody>
            </table>
        </div>

        <div class="live-badge">
            <span class="pulse-dot"></span>
            live ephemeris · click any planet to reveal its portrait
        </div>
    </div>

    <!-- ═══ modal ═══ -->
    <div id="planet-modal" class="astro-modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close-btn">&times;</button>
            <div class="modal-title" id="modal-title">Planet <span class="sub">· portrait</span></div>
            <div class="modal-image-wrap">
                <img id="modal-image" src="" alt="Planet view" />
                <div class="fallback-placeholder" id="fallback-placeholder">
                    <div class="planet-circle" id="fallback-circle">🌍</div>
                    <span style="font-size:1.4rem; font-weight:500; letter-spacing:0.02em;" id="fallback-name">Planet</span>
                    <span class="sub">✦ portrait unavailable</span>
                </div>
            </div>
            <div class="modal-footer">✦ live view · AstroGlow</div>
        </div>
    </div>

    <script>
        // ─── planet data ──────────────────────────────────────────────
        const COLORS = {
            Mercury: '#b0b8c4',
            Venus: '#f5d76e',
            Mars: '#e74c3c',
            Jupiter: '#d4a373',
            Saturn: '#d9b382',
            Uranus: '#7ec8e3',
            Neptune: '#3b6f8f'
        };

        const PLANET_IMAGES = {
            Mercury: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Mercury_in_true_color.jpg/500px-Mercury_in_true_color.jpg',
            Venus: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/85/Venus_globe.jpg/500px-Venus_globe.jpg',
            Mars: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/58/Mars_23_August_2003_hubble.jpg/500px-Mars_23_August_2003_hubble.jpg',
            Jupiter: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Jupiter_and_its_shrunken_Great_Red_Spot.jpg/500px-Jupiter_and_its_shrunken_Great_Red_Spot.jpg',
            Saturn: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Saturn_during_Equinox.jpg/500px-Saturn_during_Equinox.jpg',
            Uranus: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3d/Uranus2.jpg/500px-Uranus2.jpg',
            Neptune: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/56/Neptune_Full.jpg/500px-Neptune_Full.jpg'
        };

        const PLANET_DATA = {
            Mercury: { L: 252.25, p: 77.46, inc: 7.00, speed: 4.149 },
            Venus: { L: 181.98, p: 131.56, inc: 3.39, speed: 1.625 },
            Mars: { L: 355.43, p: 336.06, inc: 1.85, speed: 0.531 },
            Jupiter: { L: 34.35, p: 14.33, inc: 1.30, speed: 0.084 },
            Saturn: { L: 50.08, p: 92.86, inc: 2.49, speed: 0.034 },
            Uranus: { L: 314.05, p: 172.43, inc: 0.77, speed: 0.011 },
            Neptune: { L: 304.35, p: 46.68, inc: 1.77, speed: 0.006 }
        };

        const PLANET_EMOJI = {
            Mercury: '☿',
            Venus: '♀',
            Mars: '♂',
            Jupiter: '♃',
            Saturn: '♄',
            Uranus: '⛢',
            Neptune: '♆'
        };

        // ─── helpers ──────────────────────────────────────────────────
        function fmtRA(raH) {
            const h = Math.floor(raH);
            const m = Math.floor((raH - h) * 60);
            const s = ((raH - h - m / 60) * 3600).toFixed(1);
            return `${String(h).padStart(2, '0')}<span style="opacity:0.35">h</span> ${String(m).padStart(2, '0')}<span style="opacity:0.35">m</span> ${String(s).padStart(4, '0')}<span style="opacity:0.35">s</span>`;
        }

        function fmtDec(dec) {
            const sign = dec >= 0 ? '+' : '−';
            const a = Math.abs(dec);
            const d = Math.floor(a);
            const m = Math.floor((a - d) * 60);
            const s = ((a - d - m / 60) * 3600).toFixed(1);
            return `<span class="sign">${sign}</span>${String(d).padStart(2, ' ')}° ${String(m).padStart(2, '0')}′ ${String(s).padStart(4, '0')}″`;
        }

        // ─── modal controls ────────────────────────────────────────────
        const modal = document.getElementById('planet-modal');
        const modalImg = document.getElementById('modal-image');
        const modalTitle = document.getElementById('modal-title');
        const fallbackPlaceholder = document.getElementById('fallback-placeholder');
        const fallbackName = document.getElementById('fallback-name');
        const fallbackCircle = document.getElementById('fallback-circle');
        const closeBtn = document.getElementById('modal-close-btn');

        function openModal(planetName) {
            const imgUrl = PLANET_IMAGES[planetName];
            if (!imgUrl) return;

            // ── 1. Update fallback content immediately ──
            const color = COLORS[planetName] || '#ffffff';
            fallbackName.textContent = planetName;
            fallbackCircle.textContent = PLANET_EMOJI[planetName] || '✦';
            fallbackCircle.style.backgroundColor = color;
            fallbackCircle.style.setProperty('--circle-glow', color + '55');

            // ── 2. Reset to image mode ──
            modalImg.classList.remove('error');
            modalImg.style.display = '';
            fallbackPlaceholder.style.display = 'none';
            modalImg.src = imgUrl;

            // ── 3. Handle error ──
            modalImg.onerror = function() {
                this.classList.add('error');
                this.style.display = 'none';
                fallbackPlaceholder.style.display = 'flex';
            };

            // ── 4. Update title and show modal ──
            modalTitle.innerHTML = `${planetName} <span class="sub">· portrait</span>`;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
            modalImg.onerror = null;
        }

        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
        });

        // ─── update table ──────────────────────────────────────────────
        function updateTracker() {
            const now = new Date();
            const j2000 = new Date(Date.UTC(2000, 0, 1, 12, 0, 0));
            const days = (now.getTime() - j2000.getTime()) / 86400000;

            document.getElementById('timestamp').innerHTML =
                `⟡ <span>${now.toUTCString()}</span>`;

            let html = '';
            for (const [name, data] of Object.entries(PLANET_DATA)) {
                let long = (data.L + data.speed * days) % 360;
                if (long < 0) long += 360;
                const raHours = long / 15.0;
                const rads = (long - data.p) * Math.PI / 180;
                const decDeg = data.inc * Math.sin(rads);
                const color = COLORS[name] || '#ffffff';
                html += `
                    <tr data-planet="${name}">
                        <td>
                            <span class="planet-name" data-planet="${name}">
                                <span class="planet-dot" style="background:${color}; --dot-glow:${color}55;"></span>
                                ${name}
                                <span class="click-hint">⏎ view</span>
                            </span>
                        </td>
                        <td class="ra-value">${fmtRA(raHours)}</td>
                        <td class="dec-value">${fmtDec(decDeg)}</td>
                    </tr>
                `;
            }
            document.getElementById('planet-rows').innerHTML = html;
        }

        // ─── event delegation ──────────────────────────────────────────
        document.getElementById('planet-rows').addEventListener('click', (e) => {
            const target = e.target.closest('.planet-name');
            if (!target) return;
            const planet = target.dataset.planet;
            if (planet && PLANET_IMAGES[planet]) {
                openModal(planet);
            }
        });

        // ─── start ──────────────────────────────────────────────────────
        updateTracker();
        setInterval(updateTracker, 1000);

        // ─── starfield generation ──────────────────────────────────────
        (function() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 220; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = 1 + Math.random() * 2.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--d', (2 + Math.random() * 5) + 's');
                star.style.animationDelay = (Math.random() * 6) + 's';
                star.style.opacity = 0.2 + Math.random() * 0.6;
                container.appendChild(star);
            }
        })();

        console.log('✦ AstroGlow Planet Tracker loaded (standalone)');
    </script>
</body>
</html>
